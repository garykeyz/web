<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" role="img" aria-label="Hyatt Ziva and Hyatt Zilara">
  <!-- Hyatt wordmark — clean serif capitals matching brand typography -->
  <text
    x="120" y="28"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    font-weight="400"
    letter-spacing="6"
    text-anchor="middle"
    fill="#000000"
  >HYATT</text>
  <!-- Thin rule -->
  <line x1="30" y1="36" x2="210" y2="36" stroke="#000000" stroke-width="0.6"/>
  <!-- Ziva · Zilara in lighter tracking -->
  <text
    x="120" y="56"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="400"
    letter-spacing="4"
    text-anchor="middle"
    fill="#000000"
  >ZIVA &amp; ZILARA</text>
</svg>
