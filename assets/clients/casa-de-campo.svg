<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 90" role="img" aria-label="Casa de Campo Resort and Villas">
  <!-- Decorative thin rule top -->
  <line x1="40" y1="10" x2="240" y2="10" stroke="#000" stroke-width="0.5"/>
  <!-- Main wordmark -->
  <text
    x="140" y="38"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="400"
    letter-spacing="5"
    text-anchor="middle"
    fill="#000000"
  >CASA DE CAMPO</text>
  <!-- Thin rule divider -->
  <line x1="40" y1="46" x2="240" y2="46" stroke="#000" stroke-width="0.5"/>
  <!-- Subtitle -->
  <text
    x="140" y="64"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="10"
    font-weight="400"
    letter-spacing="3.5"
    text-anchor="middle"
    fill="#000000"
  >RESORT &amp; VILLAS</text>
  <!-- Decorative thin rule bottom -->
  <line x1="40" y1="74" x2="240" y2="74" stroke="#000" stroke-width="0.5"/>
</svg>
